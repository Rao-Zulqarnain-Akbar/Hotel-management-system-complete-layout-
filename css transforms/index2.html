<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .container {
            width: 30vw;
            height: 80vh;
            background-color: #65ccb6;
        }

        .box {
            background-color: #d65b5b;
            width: 34px;
            height: 45px;
            /* animation: myFirstAnimation;
            animation-duration: 3s;
            animation-iteration-count: 3;
            animation-timing-function: cubic-bezier(0.43,-0.27, 0, 0.38);
            animation-delay: 1s;
            animation-direction: alternate-reverse; */
            animation: myFirstAnimation 3s cubic-bezier(0.43,-0.27, 0, 0.38) 1s 3 alternate-reverse, Anime2 3s ease-in 1s 2;
        }

        @keyframes myFirstAnimation {
            from{
              transform: translateX(10px);
              background-color: #fff;
            }
            to{
            transform: translateX(500px);
            background-color: #096ab9;
            }     
        }

         @keyframes Anime2 {
            0%{
              transform: rotate(50deg);
            }
            20%{
               transform: rotate(90deg);
            }
            50%{
              transform: rotate(140deg);
            }
            80%{
              transform: rotate(180deg);
            }
            100%{
              transform: rotate(250deg);
            }
            
        } 
    </style>
</head>
<body>
    <div class="container">
        <div class="box">box</div>
    </div>
</body>
</html>
