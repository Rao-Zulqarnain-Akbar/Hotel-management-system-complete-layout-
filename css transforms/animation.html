<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    .container{
     position: relative;
     height: 80vh;
     width: 80vw;
     background-color: #5976fa;
     border-radius: 12px;
     animation: mint 1s linear infinite;
    }
    @keyframes mint {
        from{
        transform: translateX(0);
        }
        to{
        transform: translateX(360px);
        }
        
    }

    .box1{
     height: 120px;
     width: 120px;
     background-color: #f34f4f;
     border-radius: 70px;
     bottom: -70px;
     left: 100px;
     position: absolute;
     border: 2px solid black;
     animation: mole 1s linear infinite;
    }  
    @keyframes mole {
        from{
          transform: rotate(0);
        }
        to{
        transform: rotate(360deg);
        }
    }
    
   
    .box2{
     height: 120px;
     width: 120px;
     background-color: #f34f4f;
     border-radius: 70px;
     bottom: -70px;
     right: 180px;
     position: absolute;
    border: 2px solid black;
     animation:move 1s linear infinite;
    }
     @keyframes move {
        from{
         transform: rotate(0);
        }
        to{
        transform: rotate(360deg);
        } 
     }
    
</style>

</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
    </div>
</body>
</html>
