<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            height: 50vh;
            width: 40vw;
            background-color: #bd9d9d;

        }

        .box {
          background-color: #cbf7bd;
          width: 4vw;
          height: 5vh;
          /* transition-delay: 1s;
          transition-duration: 3s;
          transition-property: all;
          transition-timing-function: ease-in-out; */
          transition: all 3s cubic-bezier(0.42, 0, 0.12, 1.09) 1s;
        }

        .translate {
            transform: translateX(10vw) translateY(10vh) scale(2) ;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box translate"></div>
    </div>
</body>
</html>
